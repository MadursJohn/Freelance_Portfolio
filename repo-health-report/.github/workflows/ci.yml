name: CI & Scheduled Report

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run every Monday at 08:00 UTC — auto-regenerates the report weekly
    - cron: "0 8 * * 1"
  workflow_dispatch:    # Allow manual trigger from GitHub UI

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint
        run: flake8 src/ tests/ run_report.py --max-line-length=105

      - name: Test with coverage
        run: pytest tests/ -v --cov=src --cov-report=term-missing

  generate-report:
    name: Generate Health Report
    runs-on: ubuntu-latest
    needs: test
    # Only commit the report on main branch pushes and scheduled runs
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate Markdown report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python run_report.py config.json --format markdown --output HEALTH_REPORT.md

      - name: Generate HTML report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python run_report.py config.json --format html --output HEALTH_REPORT.html

      - name: Commit updated reports
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add HEALTH_REPORT.md HEALTH_REPORT.html
          git diff --staged --quiet || git commit -m "ci: update health report [skip ci]"
          git push
